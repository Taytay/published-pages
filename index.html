<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Published Pages – Tools &amp; Utilities</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    body {
      background-color: #f8f9fa;
    }
    .tool-card {
      border-radius: 0.75rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .tool-card:hover {
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.14);
      transform: translateY(-2px);
      color: inherit;
    }
    .tool-icon {
      font-size: 2rem;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="mb-5">
      <h1 class="fw-bold mb-1">Published Pages</h1>
      <p class="text-muted">A collection of static HTML tools and utilities.</p>
    </div>

    <div class="row g-4">

      <!-- String Cleaner -->
      <div class="col-12 col-sm-6 col-lg-4">
        <a href="string-cleaner.html" class="card tool-card p-4 h-100">
          <div class="tool-icon mb-3">🧹</div>
          <h5 class="fw-semibold mb-1">String Cleaner</h5>
          <p class="text-muted small mb-0">
            Paste a string and strip non-printable characters, newlines, extra
            whitespace, HTML tags, and more.
          </p>
        </a>
      </div>

      <!-- Settle Up -->
      <div class="col-12 col-sm-6 col-lg-4">
        <a href="splitwise.html" class="card tool-card p-4 h-100">
          <div class="tool-icon mb-3">💸</div>
          <h5 class="fw-semibold mb-1">Settle Up</h5>
          <p class="text-muted small mb-0">
            Track shared expenses across a group and see the minimum set of
            payments needed to settle up.
          </p>
        </a>
      </div>

    </div>
  </div>
</body>
</html>
