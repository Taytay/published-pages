<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>String Cleaner</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    body {
      background-color: #f8f9fa;
    }
    .tool-card {
      border-radius: 0.75rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    textarea {
      font-family: "Courier New", Courier, monospace;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 180px;
    }
    .string-display {
      font-family: "Courier New", Courier, monospace;
      font-size: 0.9rem;
      min-height: 180px;
      overflow: auto;
      padding: 0;
    }
    .display-line {
      display: grid;
      grid-template-columns: 3rem minmax(0, 1fr);
      border-bottom: 1px solid #e9ecef;
    }
    .display-line:last-child {
      border-bottom: 0;
    }
    .line-number {
      background-color: #f8f9fa;
      border-right: 1px solid #e9ecef;
      color: #6c757d;
      padding: 0.4rem 0.55rem;
      text-align: right;
      user-select: none;
    }
    .line-content {
      min-height: 2rem;
      padding: 0.4rem 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .diff-added {
      background-color: rgba(25, 135, 84, 0.16);
      color: #146c43;
    }
    .diff-removed {
      background-color: rgba(220, 53, 69, 0.16);
      color: #b02a37;
    }
    .option-group label {
      cursor: pointer;
    }
    #copyBtn.copied {
      background-color: #198754;
      border-color: #198754;
      color: #fff;
    }
    .badge-count {
      font-size: 0.75rem;
    }
    .d-none {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <!-- Header -->
    <div class="mb-4">
      <a href="index.html" class="text-decoration-none text-secondary small">&larr; All Tools</a>
      <h1 class="mt-2 mb-1 fw-bold">String Cleaner</h1>
      <p class="text-muted">Paste a string below and get a cleaned version based on your selected options.</p>
    </div>

    <div class="card tool-card p-4">
      <div class="row g-4">

        <!-- Options -->
        <div class="col-12 col-lg-3">
          <h6 class="fw-semibold mb-3 text-uppercase text-muted" style="font-size:0.75rem;letter-spacing:.08em;">Cleaning Options</h6>

          <div class="option-group d-flex flex-column gap-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optNonPrintable" checked />
              <label class="form-check-label" for="optNonPrintable">
                Strip non-printable characters
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optNewlines" checked />
              <label class="form-check-label" for="optNewlines">
                Remove newlines
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optTrim" />
              <label class="form-check-label" for="optTrim">
                Trim leading &amp; trailing whitespace
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optCollapseSpaces" />
              <label class="form-check-label" for="optCollapseSpaces">
                Collapse multiple spaces
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optRemoveAllWhitespace" />
              <label class="form-check-label" for="optRemoveAllWhitespace">
                Remove all whitespace
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optTabs" />
              <label class="form-check-label" for="optTabs">
                Remove tabs
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optUrlDecode" />
              <label class="form-check-label" for="optUrlDecode">
                URL decode
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optStripHtml" />
              <label class="form-check-label" for="optStripHtml">
                Remove HTML tags
              </label>
            </div>
          </div>

          <hr />
          <h6 class="fw-semibold mb-3 text-uppercase text-muted" style="font-size:0.75rem;letter-spacing:.08em;">Display Options</h6>
          <div class="option-group d-flex flex-column gap-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optShowWhitespace" />
              <label class="form-check-label" for="optShowWhitespace">
                Show whitespace characters
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optShowInvisible" />
              <label class="form-check-label" for="optShowInvisible">
                Show invisible characters
              </label>
            </div>
          </div>

          <hr />
          <h6 class="fw-semibold mb-3 text-uppercase text-muted" style="font-size:0.75rem;letter-spacing:.08em;">Line / Box Cleanup</h6>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label small mb-1" for="optRemoveFirstLines">Remove first lines</label>
              <input class="form-control form-control-sm" type="number" id="optRemoveFirstLines" min="0" value="0" />
            </div>
            <div class="col-6">
              <label class="form-label small mb-1" for="optRemoveLastLines">Remove last lines</label>
              <input class="form-control form-control-sm" type="number" id="optRemoveLastLines" min="0" value="0" />
            </div>
            <div class="col-6">
              <label class="form-label small mb-1" for="optRemoveFirstChars">Remove first characters / line</label>
              <input class="form-control form-control-sm" type="number" id="optRemoveFirstChars" min="0" value="0" />
            </div>
            <div class="col-6">
              <label class="form-label small mb-1" for="optRemoveLastChars">Remove last characters / line</label>
              <input class="form-control form-control-sm" type="number" id="optRemoveLastChars" min="0" value="0" />
            </div>
          </div>

          <hr />
          <button type="button" id="resetBtn" class="btn btn-sm btn-outline-secondary w-100">Reset to Defaults</button>
        </div>

        <!-- Input / Output -->
        <div class="col-12 col-lg-9">
          <div class="row g-3">

            <!-- Input -->
            <div class="col-12 col-lg-4">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <label for="inputText" class="form-label fw-semibold mb-0">Input</label>
                <span id="inputCount" class="badge bg-secondary badge-count">0 chars</span>
              </div>
              <textarea
                id="inputText"
                class="form-control"
                placeholder="Paste your string here…"
                spellcheck="false"
              ></textarea>
              <div class="d-flex justify-content-between align-items-center mt-2 mb-1">
                <span class="small text-muted">Visual display</span>
              </div>
              <div id="inputDisplay" class="form-control string-display" aria-live="polite"></div>
              <div class="d-flex gap-2 mt-2">
                <button type="button" id="clearBtn" class="btn btn-sm btn-outline-danger">Clear</button>
              </div>
            </div>

            <!-- Diff -->
            <div class="col-12 col-lg-4">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <label for="diffDisplay" class="form-label fw-semibold mb-0">Diff</label>
                <span class="small text-muted">Removed = red, added = green</span>
              </div>
              <div id="diffDisplay" class="form-control string-display" aria-live="polite"></div>
            </div>

            <!-- Output -->
            <div class="col-12 col-lg-4">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <label for="outputText" class="form-label fw-semibold mb-0">Output</label>
                <div class="d-flex align-items-center gap-1">
                  <span id="urlDecodeWarning" class="badge bg-warning text-dark badge-count d-none" title="Input contains malformed URI sequences; URL decode was skipped.">⚠ decode error</span>
                  <span id="outputCount" class="badge bg-success badge-count">0 chars</span>
                </div>
              </div>
              <textarea
                id="outputText"
                class="form-control"
                readonly
                placeholder="Cleaned string will appear here…"
                spellcheck="false"
              ></textarea>
              <div class="d-flex justify-content-between align-items-center mt-2 mb-1">
                <span class="small text-muted">Visual display</span>
              </div>
              <div id="outputDisplay" class="form-control string-display" aria-live="polite"></div>
              <div class="d-flex gap-2 mt-2">
                <button type="button" id="copyBtn" class="btn btn-sm btn-outline-primary">Copy to Clipboard</button>
                <span id="copyFallbackMsg" class="text-muted small align-self-center d-none">Press Ctrl+C to copy</span>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script type="module" src="/src/string-cleaner-ui.ts"></script>
</body>
</html>
