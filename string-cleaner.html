<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>String Cleaner</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    body {
      background-color: #f8f9fa;
    }
    .tool-card {
      border-radius: 0.75rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    textarea {
      font-family: "Courier New", Courier, monospace;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 180px;
    }
    .option-group label {
      cursor: pointer;
    }
    #copyBtn.copied {
      background-color: #198754;
      border-color: #198754;
      color: #fff;
    }
    .badge-count {
      font-size: 0.75rem;
    }
    .d-none {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <!-- Header -->
    <div class="mb-4">
      <a href="index.html" class="text-decoration-none text-secondary small">&larr; All Tools</a>
      <h1 class="mt-2 mb-1 fw-bold">String Cleaner</h1>
      <p class="text-muted">Paste a string below and get a cleaned version based on your selected options.</p>
    </div>

    <div class="card tool-card p-4">
      <div class="row g-4">

        <!-- Options -->
        <div class="col-12 col-lg-3">
          <h6 class="fw-semibold mb-3 text-uppercase text-muted" style="font-size:0.75rem;letter-spacing:.08em;">Cleaning Options</h6>

          <div class="option-group d-flex flex-column gap-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optNonPrintable" checked />
              <label class="form-check-label" for="optNonPrintable">
                Strip non-printable characters
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optNewlines" checked />
              <label class="form-check-label" for="optNewlines">
                Remove newlines
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optTrim" />
              <label class="form-check-label" for="optTrim">
                Trim leading &amp; trailing whitespace
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optCollapseSpaces" />
              <label class="form-check-label" for="optCollapseSpaces">
                Collapse multiple spaces
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optTabs" />
              <label class="form-check-label" for="optTabs">
                Remove tabs
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optUrlDecode" />
              <label class="form-check-label" for="optUrlDecode">
                URL decode
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="optStripHtml" />
              <label class="form-check-label" for="optStripHtml">
                Remove HTML tags
              </label>
            </div>
          </div>

          <hr />
          <button id="resetBtn" class="btn btn-sm btn-outline-secondary w-100">Reset to Defaults</button>
        </div>

        <!-- Input / Output -->
        <div class="col-12 col-lg-9">
          <div class="row g-3">

            <!-- Input -->
            <div class="col-12 col-md-6">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <label for="inputText" class="form-label fw-semibold mb-0">Input</label>
                <span id="inputCount" class="badge bg-secondary badge-count">0 chars</span>
              </div>
              <textarea
                id="inputText"
                class="form-control"
                placeholder="Paste your string here…"
                spellcheck="false"
              ></textarea>
              <div class="d-flex gap-2 mt-2">
                <button id="clearBtn" class="btn btn-sm btn-outline-danger">Clear</button>
              </div>
            </div>

            <!-- Output -->
            <div class="col-12 col-md-6">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <label for="outputText" class="form-label fw-semibold mb-0">Output</label>
                <div class="d-flex align-items-center gap-1">
                  <span id="urlDecodeWarning" class="badge bg-warning text-dark badge-count d-none" title="Input contains malformed URI sequences; URL decode was skipped.">⚠ decode error</span>
                  <span id="outputCount" class="badge bg-success badge-count">0 chars</span>
                </div>
              </div>
              <textarea
                id="outputText"
                class="form-control"
                readonly
                placeholder="Cleaned string will appear here…"
                spellcheck="false"
              ></textarea>
              <div class="d-flex gap-2 mt-2">
                <button id="copyBtn" class="btn btn-sm btn-outline-primary">Copy to Clipboard</button>
                <span id="copyFallbackMsg" class="text-muted small align-self-center d-none">Press Ctrl+C to copy</span>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    (function () {
      var inputEl           = document.getElementById('inputText');
      var outputEl          = document.getElementById('outputText');
      var inputCountEl      = document.getElementById('inputCount');
      var outputCountEl     = document.getElementById('outputCount');
      var urlDecodeWarningEl = document.getElementById('urlDecodeWarning');
      var copyFallbackMsgEl = document.getElementById('copyFallbackMsg');
      var clearBtn          = document.getElementById('clearBtn');
      var copyBtn           = document.getElementById('copyBtn');
      var resetBtn          = document.getElementById('resetBtn');

      var optNonPrintable   = document.getElementById('optNonPrintable');
      var optNewlines       = document.getElementById('optNewlines');
      var optTrim           = document.getElementById('optTrim');
      var optCollapseSpaces = document.getElementById('optCollapseSpaces');
      var optTabs           = document.getElementById('optTabs');
      var optUrlDecode      = document.getElementById('optUrlDecode');
      var optStripHtml      = document.getElementById('optStripHtml');

      var allOptions = [
        optNonPrintable, optNewlines, optTrim,
        optCollapseSpaces, optTabs, optUrlDecode, optStripHtml
      ];

      var urlDecodeError = false;

      function clean(str) {
        urlDecodeError = false;
        if (optUrlDecode.checked) {
          try {
            str = decodeURIComponent(str);
          } catch (e) {
            urlDecodeError = true; // flag shown to user; leave str as-is
          }
        }
        if (optStripHtml.checked) {
          str = str.replace(/<[^>]*>/g, '');
        }
        if (optNonPrintable.checked) {
          // Remove C0 controls (except space/tab/newline/CR which are handled by other options)
          // and C1 controls, and other non-printable Unicode categories.
          // Keep printable ASCII (0x20–0x7E) and any character >= 0xA0 (Latin-1 supplement+).
          str = str.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F\x80-\x9F]/g, '');
        }
        if (optTabs.checked) {
          str = str.replace(/\t/g, '');
        }
        if (optNewlines.checked) {
          str = str.replace(/\r\n|\r|\n/g, '');
        }
        if (optCollapseSpaces.checked) {
          str = str.replace(/ {2,}/g, ' ');
        }
        if (optTrim.checked) {
          str = str.trim();
        }
        return str;
      }

      function update() {
        var input  = inputEl.value;
        var output = clean(input);
        outputEl.value = output;
        inputCountEl.textContent  = input.length  + ' char' + (input.length  === 1 ? '' : 's');
        outputCountEl.textContent = output.length + ' char' + (output.length === 1 ? '' : 's');
        if (urlDecodeError) {
          urlDecodeWarningEl.classList.remove('d-none');
        } else {
          urlDecodeWarningEl.classList.add('d-none');
        }
      }

      inputEl.addEventListener('input', update);
      allOptions.forEach(function (opt) {
        opt.addEventListener('change', update);
      });

      clearBtn.addEventListener('click', function () {
        inputEl.value  = '';
        outputEl.value = '';
        inputCountEl.textContent  = '0 chars';
        outputCountEl.textContent = '0 chars';
        urlDecodeWarningEl.classList.add('d-none');
        copyFallbackMsgEl.classList.add('d-none');
      });

      copyBtn.addEventListener('click', function () {
        if (!outputEl.value) return;
        copyFallbackMsgEl.classList.add('d-none');
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(outputEl.value).then(function () {
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('copied');
            setTimeout(function () {
              copyBtn.textContent = 'Copy to Clipboard';
              copyBtn.classList.remove('copied');
            }, 1500);
          }).catch(function () {
            // Clipboard API available but write was denied; prompt user to copy manually
            outputEl.select();
            copyFallbackMsgEl.classList.remove('d-none');
          });
        } else {
          // Clipboard API unavailable; select text and prompt the user to copy manually
          outputEl.select();
          copyFallbackMsgEl.classList.remove('d-none');
        }
      });

      resetBtn.addEventListener('click', function () {
        optNonPrintable.checked   = true;
        optNewlines.checked       = true;
        optTrim.checked           = false;
        optCollapseSpaces.checked = false;
        optTabs.checked           = false;
        optUrlDecode.checked      = false;
        optStripHtml.checked      = false;
        update();
      });
    })();
  </script>
</body>
</html>
