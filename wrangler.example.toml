name = "taytays-tools"
compatibility_date = "2025-04-01"
pages_build_output_dir = "dist"

# Each group lives in its own Durable Object instance, keyed by its secret UUID.
# For local dev (`wrangler pages dev`) this binding is picked up automatically.
# On the deployed Pages project, add the binding in the dashboard:
#   Settings → Functions → Durable Object bindings
#   Variable name: GROUPS
#   Datastore: (from current script) → GroupDO
[[durable_objects.bindings]]
name = "GROUPS"
class_name = "GroupDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GroupDO"]
